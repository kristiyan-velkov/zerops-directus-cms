# yaml-language-server: $schema=https://api.app-prg1.zerops.io/api/rest/public/settings/zerops-yaml-json-schema.json

zerops:
  # ── base ──────────────────────────────────────────────────────────────────
  # Shared run configuration inherited by both `prod` and `dev` setups via
  # `extends: base`. Keeps env variables DRY — only the initCommands and
  # build section differ between environments.
  - setup: base
    run:
      base: nodejs@22

      ports:
        - port: 8055
          httpSupport: true

      envVariables:
        # ── Directus Core ───────────────────────────────────────────────────
        # BSL 1.1 licence acknowledgement — required, process refuses to start without it.
        ACCEPT_TERMS: "true"
        # Disable anonymous usage statistics.
        TELEMETRY: "false"
        # Set this to your subdomain URL after first deploy (e.g. https://<app>.zerops.app).
        # Required for OAuth redirect URIs, password-reset links, and CORS.
        PUBLIC_URL: ""
        # Initial admin email — change in Data Studio after first login.
        ADMIN_EMAIL: admin@example.com

        # ── Database (PostgreSQL) ────────────────────────────────────────────
        DB_CLIENT: pg
        DB_HOST: ${db_hostname}
        DB_PORT: "5432"
        # Zerops convention: database name equals the service hostname.
        DB_DATABASE: ${db_hostname}
        DB_USER: ${db_user}
        DB_PASSWORD: ${db_password}
        # min=2 keeps warm connections ready; max=10 prevents DB exhaustion under load.
        DB_POOL__MIN: "2"
        DB_POOL__MAX: "10"

        # ── Cache / Pub-Sub (Valkey) ─────────────────────────────────────────
        REDIS_HOST: ${cache_hostname}
        REDIS_PORT: "6379"
        # Required for multi-container HA: broadcasts schema cache invalidations,
        # rate-limit counters, and auth-token blacklists across all containers.
        # Harmless in single-container dev.
        SYNCHRONIZATION_STORE: redis
        CACHE_ENABLED: "true"
        CACHE_STORE: redis

        # ── Object Storage (S3-compatible) ───────────────────────────────────
        STORAGE_LOCATIONS: s3
        STORAGE_S3_DRIVER: s3
        STORAGE_S3_KEY: ${storage_accessKeyId}
        STORAGE_S3_SECRET: ${storage_secretAccessKey}
        STORAGE_S3_BUCKET: ${storage_bucketName}
        STORAGE_S3_ENDPOINT: ${storage_apiUrl}
        # us-east-1 satisfies the AWS SDK requirement; routing is region-agnostic on Zerops.
        STORAGE_S3_REGION: us-east-1
        # Path-style required for custom S3 endpoints — bucket name goes in the URL path,
        # not the hostname (virtual-hosted style is not supported on Zerops / MinIO).
        STORAGE_S3_FORCE_PATH_STYLE: "true"
        # public-read serves /assets without signed URLs — required for Data Studio previews.
        STORAGE_S3_ACL: public-read

        # ── Email ────────────────────────────────────────────────────────────
        # No email transport is set here intentionally — each environment
        # defines its own transport (dev overrides to Mailpit below;
        # production falls back to Directus's default sendmail, which
        # passes the /server/health check without needing a network connection).
        # Configure a real SMTP provider in the Zerops GUI by setting:
        #   EMAIL_TRANSPORT, EMAIL_SMTP_HOST, EMAIL_SMTP_PORT,
        #   EMAIL_SMTP_USER, EMAIL_SMTP_PASSWORD, EMAIL_FROM
        EMAIL_FROM: ${DIRECTUS_EMAIL_FROM:-no-reply@directus.local}

  # ── prod ──────────────────────────────────────────────────────────────────
  # Production setup. Referenced in recipes/directus/1 — Production/import.yaml
  # via `zeropsSetup: prod`. Extends base for all env variables.
  - setup: prod
    extends: base

    build:
      base: nodejs@22
      buildCommands:
        # npm ci = reproducible build from lockfile; --omit=dev keeps the artifact lean.
        - npm ci --omit=dev
      deployFiles:
        - node_modules
        - package.json
        - package-lock.json
        # data/          — seed input (data.json + images/ + uploads/)
        # database/      — snapshot.yaml applied by `directus schema apply`
        # extensions/    — directus-extension-seed-demo auto-healing hook
        - data
        - database
        - extensions
      cache: node_modules

    deploy:
      readinessCheck:
        httpGet:
          port: 8055
          path: /server/health
        failureTimeout: 120s
        retryPeriod: 5s

    run:
      # zsc execOnce: only the first container per deploy runs each command.
      # Remaining containers in the HA pool see the lock taken and skip to `start`.
      # See https://docs.zerops.io/references/zsc#execonce
      initCommands:
        - zsc execOnce "bootstrap-$ZEROPS_appVersionId" -- node_modules/.bin/directus bootstrap
        - zsc execOnce "schema-$ZEROPS_appVersionId"    -- node_modules/.bin/directus schema apply --yes ./database/snapshot.yaml

      start: node_modules/.bin/directus start

      healthCheck:
        httpGet:
          port: 8055
          path: /server/health

  # ── directus ──────────────────────────────────────────────────────────────
  # Hostname-matched alias for the production setup. Zerops defaults to looking
  # up the setup by service hostname when `zeropsSetup` is not set on the service.
  # Projects imported without `zeropsSetup: prod` will hit this setup instead of `prod`.
  - setup: directus
    extends: base

    build:
      base: nodejs@22
      buildCommands:
        - npm ci --omit=dev
      deployFiles:
        - node_modules
        - package.json
        - package-lock.json
        - data
        - database
        - extensions
      cache: node_modules

    deploy:
      readinessCheck:
        httpGet:
          port: 8055
          path: /server/health

    run:
      initCommands:
        - zsc execOnce "bootstrap-$ZEROPS_appVersionId" -- node_modules/.bin/directus bootstrap
        - zsc execOnce "schema-$ZEROPS_appVersionId"    -- node_modules/.bin/directus schema apply --yes ./database/snapshot.yaml

      start: node_modules/.bin/directus start

      healthCheck:
        httpGet:
          port: 8055
          path: /server/health

  # ── dev ───────────────────────────────────────────────────────────────────
  # Development setup. Referenced in recipes/directus/0 — Development/import.yaml
  # via `zeropsSetup: dev`. Extends base for all env variables.
  - setup: dev
    extends: base

    build:
      base: nodejs@22
      buildCommands:
        - npm ci --omit=dev
      deployFiles:
        - node_modules
        - package.json
        - package-lock.json
        - data
        - database
        - extensions
      cache: node_modules

    deploy:
      readinessCheck:
        httpGet:
          port: 8055
          path: /server/health
        failureTimeout: 120s
        retryPeriod: 5s

    run:
      envVariables:
        # ── Email (Mailpit SMTP sink) ─────────────────────────────────────────
        # Dev-only: route all outgoing email to Mailpit for inspection in its UI.
        # In production this block is absent; Directus defaults to sendmail
        # (no network health check), so /server/health stays green without SMTP.
        EMAIL_TRANSPORT: smtp
        EMAIL_SMTP_HOST: mailpit
        EMAIL_SMTP_PORT: "1025"

      initCommands:
        - zsc execOnce "bootstrap-$ZEROPS_appVersionId" -- node_modules/.bin/directus bootstrap
        - zsc execOnce "schema-$ZEROPS_appVersionId"    -- node_modules/.bin/directus schema apply --yes ./database/snapshot.yaml

      start: node_modules/.bin/directus start

      healthCheck:
        httpGet:
          port: 8055
          path: /server/health
