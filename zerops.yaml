# yaml-language-server: $schema=https://api.app-prg1.zerops.io/api/rest/public/settings/zerops-yaml-json-schema.json

zerops:
  # ── base ──────────────────────────────────────────────────────────────────
  # Shared run configuration inherited by both `prod` and `dev` setups via
  # `extends: base`. Keeps env variables DRY — only the initCommands and
  # build section differ between environments.
  - setup: base
    run:
      base: alpine/nodejs@22

      ports:
        - port: 8055
          httpSupport: true

      envVariables:
        # zsc execOnce uses PM2 internally. PM2 resolves its home directory from
        # the HOME env var; without it, it falls back to /etc/.pm2 which is not
        # writable, causing EACCES errors and breaking the execOnce lock mechanism.
        # /tmp is always writable in Zerops containers.
        HOME: /tmp

        # ── Directus Core ───────────────────────────────────────────────────
        # BSL 1.1 licence acknowledgement — required, process refuses to start without it.
        ACCEPT_TERMS: "true"
        # Disable anonymous usage statistics.
        TELEMETRY: "false"
        # Set this to your subdomain URL after first deploy (e.g. https://<app>.zerops.app).
        # Required for OAuth redirect URIs, password-reset links, and CORS.
        PUBLIC_URL: "https://directus-238d-8055.prg1.zerops.app"
        # Initial admin email — change in Data Studio after first login.
        ADMIN_EMAIL: admin@example.com

        # ── Database (PostgreSQL) ────────────────────────────────────────────
        DB_CLIENT: pg
        DB_HOST: ${db_hostname}
        DB_PORT: "5432"
        # Zerops convention: database name equals the service hostname.
        DB_DATABASE: ${db_hostname}
        DB_USER: ${db_user}
        DB_PASSWORD: ${db_password}
        # min=2 keeps warm connections ready; max=10 prevents DB exhaustion under load.
        DB_POOL__MIN: "2"
        DB_POOL__MAX: "10"

        # ── Cache / Pub-Sub (Valkey) ─────────────────────────────────────────
        REDIS_HOST: ${cache_hostname}
        REDIS_PORT: "6379"
        # Required for multi-container HA: broadcasts schema cache invalidations,
        # rate-limit counters, and auth-token blacklists across all containers.
        # Harmless in single-container dev.
        SYNCHRONIZATION_STORE: redis
        CACHE_ENABLED: "true"
        CACHE_STORE: redis
        # Without this, cached API responses are never invalidated on writes —
        # a PATCH/DELETE on container A leaves container B returning stale 304s.
        # CACHE_AUTO_PURGE broadcasts a purge event through SYNCHRONIZATION_STORE
        # so all containers drop their cached entries for the affected collection.
        CACHE_AUTO_PURGE: "true"
        # Directus admin UI sends `Cache-Control: no-cache` (not `no-store`).
        # Without this flag the studio ignores that header and serves stale data
        # even with CACHE_AUTO_PURGE enabled. Workaround for directus/directus#26278
        # (open as of Directus 11.17, fix PR #26659 was closed without merging).
        CACHE_SKIP_ALLOWED: "true"

        # ── Object Storage (S3-compatible) ───────────────────────────────────
        STORAGE_LOCATIONS: s3
        STORAGE_S3_DRIVER: s3
        STORAGE_S3_KEY: ${storage_accessKeyId}
        STORAGE_S3_SECRET: ${storage_secretAccessKey}
        STORAGE_S3_BUCKET: ${storage_bucketName}
        STORAGE_S3_ENDPOINT: ${storage_apiUrl}
        # us-east-1 satisfies the AWS SDK requirement; routing is region-agnostic on Zerops.
        STORAGE_S3_REGION: us-east-1
        # Path-style required for custom S3 endpoints — bucket name goes in the URL path,
        # not the hostname (virtual-hosted style is not supported on Zerops / MinIO).
        STORAGE_S3_FORCE_PATH_STYLE: "true"
        # public-read serves /assets without signed URLs — required for Data Studio previews.
        STORAGE_S3_ACL: public-read

        # ── Seeding ──────────────────────────────────────────────────────────
        # SEED_VERSION is intentionally absent here. The seed hook skips when
        # this variable is unset, making production safe by default.
        # To enable seeding: set SEED_VERSION in the Zerops GUI or as an envSecret
        # in the relevant import.yaml. For development, it is set in the dev setup's
        # run.envVariables block below.

        # ── Email ────────────────────────────────────────────────────────────
        # No email transport is set here intentionally — each environment
        # defines its own transport (dev overrides to Mailpit below;
        # production falls back to Directus's default sendmail, which
        # passes the /server/health check without needing a network connection).
        # Configure a real SMTP provider in the Zerops GUI by setting:
        #   EMAIL_TRANSPORT, EMAIL_SMTP_HOST, EMAIL_SMTP_PORT,
        #   EMAIL_SMTP_USER, EMAIL_SMTP_PASSWORD, EMAIL_FROM
        EMAIL_FROM: ${DIRECTUS_EMAIL_FROM:-no-reply@directus.local}

  # ── dev ───────────────────────────────────────────────────────────────────
  # Development setup. Referenced in recipes/directus/0 — Development/import.yaml
  # via `zeropsSetup: dev`. Extends base for all env variables.
  - setup: dev
    extends: base

    build:
      base: alpine/nodejs@22
      buildCommands:
        # npm ci does a clean, reproducible install from package-lock.json.
        # ~/.npm is npm's download cache — packages are read from disk instead
        # of the network on cache hits, cutting install time from ~60–90 s to ~5–10 s.
        # node_modules itself is NOT cached because npm ci always deletes it first.
        - npm ci --omit=dev
      deployFiles:
        - node_modules
        - package.json
        - package-lock.json
        - data
        - database
        - extensions
        - scripts
      cache: ~/.npm

    deploy:
      readinessCheck:
        httpGet:
          port: 8055
          path: /server/health
        # Go time.Duration strings — the Zerops runtime rejects plain integers
        # with "cannot unmarshal !!int into time.Duration" despite docs showing integers.
        # 180s covers the worst case: cold-start DB + bootstrap + schema apply.
        failureTimeout: 180s
        retryPeriod: 5s

    run:
      envVariables:
        # ── Email (Mailpit SMTP sink) ─────────────────────────────────────────
        # Dev-only: route all outgoing email to Mailpit for inspection in its UI.
        # In production this block is absent; Directus defaults to sendmail
        # (no network health check), so /server/health stays green without SMTP.
        EMAIL_TRANSPORT: smtp
        EMAIL_SMTP_HOST: mailpit
        EMAIL_SMTP_PORT: "1025"

        # ── Demo content seeding ──────────────────────────────────────────────
        # SEED_VERSION is set here (dev only) so the seed hook runs in development.
        # Production intentionally omits this — set it in the Zerops GUI or as an
        # envSecret in import.yaml only if you want demo content on production.
        SEED_VERSION: "1.0.0"

      initCommands:
        - zsc execOnce "bootstrap-$ZEROPS_appVersionId" -- node_modules/.bin/directus bootstrap
        - zsc execOnce "schema-cms-v1" -- node scripts/ensure-schema.mjs

      start: node_modules/.bin/directus start

      healthCheck:
        httpGet:
          port: 8055
          path: /server/health
        # Go time.Duration strings — the Zerops runtime rejects plain integers
        # with "cannot unmarshal !!int into time.Duration" despite docs showing integers.
        failureTimeout: 60s
        disconnectTimeout: 30s
        recoveryTimeout: 30s
        execPeriod: 15s

  # ── prod ──────────────────────────────────────────────────────────────────
  # Production setup. Referenced in recipes/directus/1 — Production/import.yaml
  # via `zeropsSetup: prod`. Extends base for all env variables.
  - setup: prod
    extends: base

    build:
      base: alpine/nodejs@22
      buildCommands:
        # npm ci does a clean, reproducible install from package-lock.json.
        # ~/.npm is npm's download cache — packages are read from disk instead
        # of the network on cache hits, cutting install time from ~60–90 s to ~5–10 s.
        # node_modules itself is NOT cached because npm ci always deletes it first.
        - npm ci --omit=dev
      deployFiles:
        - node_modules
        - package.json
        - package-lock.json
        # data/          — seed input (data.json + images/ + uploads/)
        # database/      — snapshot.yaml applied by scripts/ensure-schema.mjs
        # extensions/    — directus-extension-seed-demo auto-healing hook
        # scripts/       — ensure-schema.mjs (conditional schema apply guard)
        - data
        - database
        - extensions
        - scripts
      cache: ~/.npm

    deploy:
      readinessCheck:
        httpGet:
          port: 8055
          path: /server/health
        # Go time.Duration strings — the Zerops runtime rejects plain integers
        # with "cannot unmarshal !!int into time.Duration" despite docs showing integers.
        # 180s covers the worst case: cold-start DB + bootstrap + schema apply.
        failureTimeout: 180s
        retryPeriod: 5s

    run:
      # zsc execOnce: only the first container per deploy runs each command.
      # Remaining containers in the HA pool see the lock taken and skip to `start`.
      # See https://docs.zerops.io/references/zsc#execonce
      initCommands:
        - zsc execOnce "bootstrap-$ZEROPS_appVersionId" -- node_modules/.bin/directus bootstrap
        # Schema apply uses a FIXED execOnce key + a DB check inside the script.
        # Two layers of protection ensure schema apply NEVER runs on an existing DB:
        #   1. zsc execOnce "schema-cms-v1" — runs at most once per project lifetime.
        #   2. ensure-schema.mjs checks hasTable('categories') before calling apply.
        # Bumping SEED_VERSION does NOT trigger schema apply.
        # To update the schema: edit snapshot.yaml and change the key to "schema-cms-v2".
        - zsc execOnce "schema-cms-v1" -- node scripts/ensure-schema.mjs

      start: node_modules/.bin/directus start

      healthCheck:
        httpGet:
          port: 8055
          path: /server/health
        # Go time.Duration strings — the Zerops runtime rejects plain integers
        # with "cannot unmarshal !!int into time.Duration" despite docs showing integers.
        failureTimeout: 60s
        disconnectTimeout: 30s
        recoveryTimeout: 30s
        execPeriod: 15s

  # ── directus ──────────────────────────────────────────────────────────────
  # Hostname-matched alias for the production setup. Zerops resolves the setup
  # by service hostname when `zeropsSetup` is not explicitly set in import.yaml.
  # Projects imported without `zeropsSetup: prod` will fall through to this block.
  # Extends prod so both are always in sync — only the name differs.
  - setup: directus
    extends: prod
