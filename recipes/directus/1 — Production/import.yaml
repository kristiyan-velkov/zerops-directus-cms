# zeropsPreprocessor=on
# yaml-language-server: $schema=https://api.app-prg1.zerops.io/api/rest/public/settings/import-project-yaml-json-schema.json

project:
  name: directus-production
  # SERIOUS corePackage allocates dedicated cluster resources appropriate
  # for a production workload with HA services.
  corePackage: SERIOUS

services:
  # ── 1. PostgreSQL database (HA) ───────────────────────────────────────────
  # HA mode provisions a 3-node cluster with automatic failover and
  # synchronous replication — no data loss on primary failure.
  # Deployed first (priority 10) so the database is ready before
  # any Directus container starts its initCommands.
  - hostname: db
    type: postgresql@16
    mode: HA
    priority: 10

  # ── 2. Valkey cache / pub-sub (HA) ────────────────────────────────────────
  # HA Valkey cluster required for multi-container Directus.
  # Directus uses Valkey (via SYNCHRONIZATION_STORE=redis) to synchronise:
  #   - Schema cache invalidations  (prevents stale schema bugs)
  #   - Rate-limit counters         (prevents bypassing limits by hitting different containers)
  #   - Auth token blacklists       (ensures logout is respected by all containers)
  # Without HA Valkey, a single cache node failure would bring down
  # session handling for all Directus containers simultaneously.
  - hostname: cache
    type: valkey@7.2
    mode: HA
    priority: 9

  # ── 3. S3-compatible object storage ──────────────────────────────────────
  # 50 GB for production file uploads. 'public-read' makes assets accessible
  # without signed URLs — required for Directus asset serving and image
  # transformations via the /assets endpoint.
  # To increase storage: Zerops GUI → storage service → resize (may require brief downtime).
  # Monitor usage at: Zerops GUI → storage service → Overview.
  - hostname: storage
    type: object-storage
    priority: 8
    objectStorageSize: 50
    objectStoragePolicy: public-read

  # ── 4. Directus application (multi-container) ────────────────────────────
  # 2–6 containers with load-balanced traffic.
  # minContainers=2 ensures zero-downtime rolling upgrades:
  #   Zerops starts new containers and waits for the readiness check to pass
  #   before terminating old ones.
  # maxContainers=6 allows horizontal scale-out under traffic spikes.
  #
  # NOTE: Mailpit is intentionally excluded from the production environment.
  # Configure a real SMTP provider by setting environment variables on this
  # service after deploy (see README for instructions):
  #   EMAIL_TRANSPORT, EMAIL_SMTP_HOST, EMAIL_SMTP_PORT, DIRECTUS_EMAIL_FROM
  #   EMAIL_SMTP_USER (secret), EMAIL_SMTP_PASSWORD (secret)
  - hostname: directus
    type: alpine/nodejs@22
    # IMPORTANT: Change this to your own repository before deploying to production.
    # Leaving it as-is builds from the public recipe repo, not your customised fork.
    buildFromGit: https://github.com/kristiyan-velkov/zerops-directus-cms
    # `zeropsSetup: production` selects the `setup: production` block from zerops.yaml.
    # It extends `setup: base` (shared env variables) and adds the production-specific
    # build and initCommands. Demo content is seeded by the
    # `extensions/directus-extension-seed-demo` hook — only into empty tables,
    # so existing production content is never overwritten on redeploys.
    # To skip demo content entirely, delete `extensions/directus-extension-seed-demo/`.
    zeropsSetup: production
    enableSubdomainAccess: true
    minContainers: 2
    maxContainers: 6
    # Directus 11 + Node.js 22 idles at ~300–500 MB per container.
    # Cold-start (bootstrap + schema apply + seed) can spike to ~700–900 MB.
    # With minContainers=2 and minRam=1, total minimum is 2 GB — adequate headroom.
    # Load-test before going live to validate memory bounds for your workload.
    verticalAutoscaling:
      minRam: 1
      maxRam: 16
      minCpu: 1
      maxCpu: 8
    envSecrets:
      # SECRET signs every JWT issued by Directus (access tokens, refresh
      # tokens, password-reset tokens). Must be a long random string.
      # Rotating this value invalidates all existing sessions.
      SECRET: <@generateRandomString(<64>)>

      # Admin account credentials seeded by 'directus bootstrap' on first run.
      # Retrieve these from the service's Secret Variables panel after deploy.
      # Change the admin email (ADMIN_EMAIL) to a real address after first login.
      ADMIN_PASSWORD: <@generateRandomString(<20>)>

      # Static API token for CI/CD pipelines and automation scripts.
      # Use this for programmatic access instead of password-based logins.
      # ⚠ This token has full admin privileges. Rotate it after initial CI/CD setup
      # or remove it entirely once pipelines are configured via scoped tokens.
      # To disable: Zerops GUI → service → Environment Variables → delete ADMIN_TOKEN.
      ADMIN_TOKEN: <@generateRandomString(<40>)>

      # Seed version — the seed hook runs once per unique value of this variable.
      # Bump to re-seed on the next deploy (e.g. after updating data.json).
      # Remove or leave empty to disable seeding (recommended once you have real data).
      SEED_VERSION: "1.0.0"
