# zeropsPreprocessor=on
# yaml-language-server: $schema=https://api.app-prg1.zerops.io/api/rest/public/settings/import-project-yaml-json-schema.json

project:
  name: directus-development

services:
  # ── 1. PostgreSQL database ────────────────────────────────────────────────
  # Deployed first (priority 10) so the database is accepting connections
  # before the Directus container starts its initCommands.
  # NON_HA is sufficient for development; use HA in production.
  - hostname: db
    type: postgresql@16
    mode: NON_HA
    priority: 10

  # ── 2. Valkey cache / pub-sub ─────────────────────────────────────────────
  # Valkey is a Redis-compatible key-value store.
  # Required even in development because zerops.yaml sets
  # SYNCHRONIZATION_STORE=redis unconditionally. Directus uses it to
  # broadcast schema cache invalidations across containers.
  - hostname: cache
    type: valkey@7.2
    mode: NON_HA
    priority: 9

  # ── 3. S3-compatible object storage ──────────────────────────────────────
  # Stores all Directus file uploads. 'public-read' makes uploaded assets
  # accessible without authentication — required for serving images in the
  # Data Studio and via the /assets endpoint.
  # To increase storage: Zerops GUI → storage service → resize (may require brief downtime).
  # Monitor usage at: Zerops GUI → storage service → Overview.
  - hostname: storage
    type: object-storage
    priority: 8
    objectStorageSize: 10
    objectStoragePolicy: public-read

  # ── 4. Mailpit SMTP sink ──────────────────────────────────────────────────
  # Mailpit is a lightweight SMTP sink that captures all outbound email.
  # Directus will send password-reset emails, magic-link invitations, etc.
  # to Mailpit instead of a real mail server — safe for development.
  # Open the Mailpit web UI (port 8025) via the service subdomain to inspect
  # captured messages.
  # The setup name in zerops-recipe-apps/mailpit-app is `mailpit`, so the
  # service hostname MUST match — otherwise Zerops emits
  # "The setup was not found. {name: [mail]}" at deploy time.
  - hostname: mailpit
    type: alpine@3.21
    buildFromGit: https://github.com/zerops-recipe-apps/mailpit-app
    enableSubdomainAccess: true

  # ── 5. Directus application ───────────────────────────────────────────────
  # Single container (minContainers=1, maxContainers=1) for development.
  # The randomly generated secrets below are stored as Zerops env secrets
  # and are only ever visible in the Zerops GUI — they are never stored in
  # source code or import YAML in plaintext.
  - hostname: directus
    type: alpine/nodejs@22
    # IMPORTANT: Change this to your own repository before deploying to production.
    # Leaving it as-is builds from the public recipe repo, not your customised fork.
    buildFromGit: https://github.com/kristiyan-velkov/zerops-directus-cms
    # `zeropsSetup: development` selects the `setup: development` block from zerops.yaml.
    # It extends `setup: base` (shared env variables) and adds the development-specific
    # build and initCommands. Demo content is seeded by the
    # `extensions/directus-extension-seed-demo` hook on every `server.start`,
    # so deleted rows auto-recover on the next container restart.
    zeropsSetup: development
    enableSubdomainAccess: true
    minContainers: 1
    maxContainers: 1
    # Directus 11 idles at ~300–500 MB. Cold-start (bootstrap + schema apply + seed)
    # can spike to ~700–900 MB. minRam=1 provides adequate headroom for development.
    verticalAutoscaling:
      minRam: 1
      maxRam: 4
    envSecrets:
      # SECRET signs every JWT issued by Directus (access tokens, refresh
      # tokens, password-reset tokens). Must be a long random string.
      # Rotating this value invalidates all existing sessions.
      SECRET: <@generateRandomString(<64>)>

      # Admin account credentials seeded by 'directus bootstrap' on first run.
      # Retrieve these from the service's Secret Variables panel after deploy.
      ADMIN_PASSWORD: <@generateRandomString(<20>)>

      # Static API token for CI/CD pipelines and automation scripts.
      # Use this instead of a password-based login for programmatic access.
      # ⚠ This token has full admin privileges. Rotate it after initial CI/CD setup
      # or remove it entirely once pipelines are configured via scoped tokens.
      # To disable: Zerops GUI → service → Environment Variables → delete ADMIN_TOKEN.
      ADMIN_TOKEN: <@generateRandomString(<40>)>

      # Seed version — the seed hook runs once per unique value of this variable.
      # Bump to re-seed on the next deploy (e.g. after updating data.json).
      # Remove or leave empty to disable seeding (recommended for envs with real data).
      SEED_VERSION: "1.0.0"
